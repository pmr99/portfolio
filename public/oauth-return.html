<!DOCTYPE html>
<html>
<head><title>Mani - OAuth Return</title></head>
<body>
<p style="font-family:sans-serif;color:#666;text-align:center;margin-top:40px;font-size:14px">Completing bank connection...</p>
<script>
  // Store the full URL (with oauth_state_id) so the app can pass it as receivedRedirectUri
  localStorage.setItem('plaid_oauth_redirect_uri', window.location.href);

  // Find the app — check stored origin first, fallback to same-origin (if app is deployed here)
  var appOrigin = localStorage.getItem('mani_app_origin') || window.location.origin;
  window.location.href = appOrigin + '/oauth-return';
</script>
</body>
</html>
